<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamatid Health Center - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="container">
        <div class="login-left">
            <div class="logo-area">
                <img src="logo.png" alt="Brgy. Mamatid Logo"> 
                <div>
                    <h4>Barangay Mamatid</h4>
                    <p style="font-size: 12px; color: #a0b2bc;">City of Cabuyao, Laguna</p>
                </div>
            </div>
            
            <div class="left-panel">
                <div class="tagline">• SERBISYONG WOW! MAMATID •</div>
                <h1>Mamatid<br>Health<br>Center</h1>
                <p>Serbisyong WOW! para sa mamamayan, your community health partner.</p>
            </div>
        </div>

        <div class="login-right">
            <div class="login-form-card"> 
                
                <div class="login-icon">
                    <i class="fa-solid fa-user"></i>
                </div>
                
                <h2>Patient Login</h2>
                <p class="subtitle">Sign in to your health portal</p>
                
                <div class="role-switch">
                    <button class="active">Patient</button>
                    <button>Staff</button>
                </div>

                <form>
                    <label for="email">Email Address</label>
                    <div style="position: relative;">
                        <i class="fa-regular fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                        <input type="email" id="email" placeholder="Enter your email" style="padding-left: 40px;">
                    </div>

                    <label for="password">Password</label>
                    <div class="password-box">
                        <i class="fa-solid fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b;"></i>
                        <input type="password" id="password" placeholder="Enter your password" style="padding-left: 40px;">
                        <span>Show</span>
                    </div>

                    <div class="options">
                        <label>
                            <input type="checkbox"> Remember Me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn">LOGIN</button>
                </form>

                <div class="divider">Or continue with</div>

                <div class="socials">
                    <button><i class="fa-brands fa-google" style="color: #db4437; margin-right: 8px;"></i> Google</button>
                    <button><i class="fa-brands fa-facebook" style="color: #1877f2; margin-right: 8px;"></i> Facebook</button>
                </div>

                <div class="register">
                    Don't have an account? <a href="#">Register an Account</a>
                </div>
                
            </div> </div> </div> </body>
</html>
